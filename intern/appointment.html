<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Appointment Form</h1>
                            
    <br>
    <br>
    
    <form>

        <fieldset>
        
        

            <label for="Full Name">Full Name</label>
            <input type ="text" id="fullName" name = "full Name" placeholder="Enter your Full Name">
            <br>
            <br>
            <label for ="Address">Your Address</label>
            <input type="text" id="address" name="address" placeholder="Enter your Address">
            <br>
            <br>
            <label for="Phone Number">Phone Number</label>
            <input type="tel" id="phoneNumber" name="phone Number" placeholder="Enter your Phone Number">
            <br>
            <br>
            <label for="Email">Email</label>        
            <input type="email" id="email" name="email" placeholder="Enter your Email">
            <br>
            <br>
            <label for="Appointment Date">Appointment Date</label>
            <input type="date" id="appointmentDate" name="appointment Date">
            <br>
            <br>
            <label for="Service Type">Service Type</label>
            <select id="serviceType" name="service Type">
                <  option value="consultation">Consultation</option>
                <option value="follow-up">Follow-up</option>
                <option value="emergency">Emergency</option>
                <option value="routine-checkup">Routine Checkup</option>    
            <label for="Appointment Time">Appointment Time</label>
            <input type="time" id="appointmentTime" name="appointment Time">
            <br>
            <br>    
            <input type="submit" value="Submit">

        </fieldset>
    </form>
</body>
</html>
